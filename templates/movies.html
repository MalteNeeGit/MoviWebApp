
    {% extends "base.html" %}
    {% block content %}
    <h1>Filme</h1>
    <ul>
        {% for movie in movies %}
        <li>{{ movie.name }} - {{ movie.director }} - {{ movie.year }}</li>
        <img src="{{ movie.poster_url }}" alt="Plakat von {{ movie.name }}" height="200">
        <div class="button-group">
            <form action="{{ url_for('update_movie', user_id=user_id, movie_id=movie.id) }}" method="GET">
                <button type="submit">Diesen Film updaten</button>
            </form>
            <form action="{{ url_for('delete_movie', user_id=user_id, movie_id=movie.id) }}" method="POST">
                <button type="submit">Diesen Film löschen</button>
            </form>
        </div>
        {% endfor %}
    </ul>
        <form action="{{ url_for('add_movies', user_id=user_id) }}" method="POST">
        <input type="text" name="movie">
        <button type="submit">Film hinzufügen</button>
    </form>
    {% endblock %}
